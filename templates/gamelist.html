<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO Games Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        .game-card { 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .game-card img { width: 100%; height: auto; }
        .game-info { padding: 15px; flex-grow: 1; }
        .game-title { margin: 0 0 10px 0; font-size: 1.2rem; color: #222; }
        .game-detail { margin: 5px 0; font-size: 0.9rem; color: #555; }
        .btn { 
            display: block; 
            background: #007BFF; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            padding: 10px; 
            margin-top: auto; 
        }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>MMO Games by Release Date</h1>

    <div class="dashboard-grid">
        {% for game in games %}
        <div class="game-card">
            <img src="{{ game.thumbnail }}" alt="{{ game.title }} Thumbnail">
            <div class="game-info">
                <h2 class="game-title">{{ game.title }}</h2>
                <p class="game-detail"><strong>Genre:</strong> {{ game.genre }}</p>
                <p class="game-detail"><strong>Platform:</strong> {{ game.platform }}</p>
                <p class="game-detail"><strong>Release Date:</strong> {{ game.release_date }}</p>
                <p class="game-detail"><strong>Publisher:</strong> {{ game.publisher }}</p>
            </div>
            <a href="{{ game.game_url }}" target="_blank" class="btn">View Game</a>
        </div>
        {% else %}
        <p>No games found or API request failed.</p>
        {% endfor %}
    </div>

</body>
</html>
